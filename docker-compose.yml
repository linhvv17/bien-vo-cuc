services:
  postgres:
    image: postgres:16-alpine
    container_name: bien-vo-cuc-postgres
    environment:
      POSTGRES_USER: bienvo
      POSTGRES_PASSWORD: bienvo
      POSTGRES_DB: bienvo_cuc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bienvo -d bienvo_cuc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bien-vo-cuc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  redis_data:

