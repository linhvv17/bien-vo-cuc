name: bien_vo_cuc
description: "Biển Vô Cực — Flutter app (shell + routing; local modules trong packages/)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  flutter_modular: ^6.4.1
  modular_core: ^3.4.1
  flutter_dotenv: ^5.2.1

  # Module nội bộ — nằm trong thư mục apps/mobile/packages/
  bvc_network:
    path: packages/bvc_network
  bvc_common:
    path: packages/bvc_common
  bvc_ui:
    path: packages/bvc_ui
  bvc_auth:
    path: packages/bvc_auth
  bvc_home:
    path: packages/bvc_home
  bvc_services:
    path: packages/bvc_services
  bvc_booking:
    path: packages/bvc_booking
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
